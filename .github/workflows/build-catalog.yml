# =============================================================================
# Build Catalog Pipeline
# =============================================================================
#
# This workflow compiles XML DAT files into signed zstd-compressed JSONL artifacts
# and publishes them as GitHub Releases for distribution to the P2P network.
#
# Fully automated flow:
#   1. meshARKade-dats relay opens a PR on this repo (update-dats/** branch)
#   2. This workflow triggers on the branch push
#   3. CI check: typecheck, test, compile (validates DATs parse correctly)
#   4. If compile passes → auto-merge the PR (squash into main)
#   5. Sign the compiled artifacts with Ed25519
#   6. Create GitHub Release with all .jsonl.gz files + signed manifest
#
# The merge and release happen in the SAME workflow run — no second trigger
# needed. We don't need branch protection or required checks because the
# relay is our own pipeline and we've already validated the DATs upstream.
#
# Also triggers on:
#   - Push to main (manual push or external merge) → compile + sign + release
#   - Manual workflow_dispatch → same as main
#
# Secrets required:
#   MESH_SIGNING_KEY — Ed25519 secret key (128 hex chars) for signing
#                      the catalog manifest. Generate with: npm run keygen
#
# =============================================================================

name: Build Catalog

on:
  push:
    branches:
      - main
      - 'update-dats/**'
  workflow_dispatch:

# Only allow one run at a time — prevents overlapping releases on the same day
concurrency:
  group: build-catalog
  cancel-in-progress: true

# Silence Node 20 deprecation warnings from actions/*@v4
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    # Write permissions for:
    #   - contents: creating releases, pushing tags, merging PRs
    #   - pull-requests: merging the auto-generated PR
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Discord notification (started)
        if: env.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          RUN_URL="https://github.com/Mesh-ARKade/meshARKade-database/actions/runs/${{ github.run_id }}"
          curl -s -H "Content-Type: application/json" -d "{
            \"embeds\": [{
              \"title\": \"Build Catalog Started\",
              \"description\": \"Branch: \`${GITHUB_REF_NAME}\` · Commit: \`${GITHUB_SHA::7}\`\n[View run](${RUN_URL})\",
              \"color\": 16776960
            }]
          }" "$DISCORD_WEBHOOK_URL"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: npm install

      - name: Install zstd
        run: sudo apt-get update && sudo apt-get install -y zstd

      - name: Validate TypeScript
        run: npm run validate

      - name: Run tests
        run: npm test

      - name: Build TypeScript
        run: npm run build

      # -----------------------------------------------------------------------
      # Compile: XML DATs → zstd-compressed JSONL artifacts
      # -----------------------------------------------------------------------
      # Reads every .dat file from input/{source}/, parses the Logiqx XML,
      # and writes one .jsonl.zst file per system to output/.
      # Also writes output/compile-manifest.json with metadata for sign.ts.
      - name: Compile DAT files
        run: npm run compile 2>&1 | tee /tmp/compile.log

      # -----------------------------------------------------------------------
      # Auto-merge (update-dats/** branches only)
      # -----------------------------------------------------------------------
      # If we got this far on a PR branch, the DATs compiled successfully.
      # Squash-merge the PR into main so the input/ files land on main
      # before we create the release. The release tag targets main.
      - name: Auto-merge PR
        if: startsWith(github.ref, 'refs/heads/update-dats/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Find the open PR for this branch
          BRANCH="${GITHUB_REF#refs/heads/}"
          echo "[merge] Looking for PR on branch: $BRANCH"

          PR_NUMBER=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number')

          if [ -z "$PR_NUMBER" ]; then
            echo "[merge] No open PR found for branch $BRANCH — skipping merge"
            exit 0
          fi

          echo "[merge] Fetching PR body for release notes..."
          PR_BODY=$(gh pr view "$PR_NUMBER" --json body --jq .body)
          echo "PR_BODY<<EOF" >> "$GITHUB_ENV"
          echo "$PR_BODY" >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"

          echo "[merge] Merging PR #$PR_NUMBER (squash)..."
          # Fetch main ref so gh can compute the squash diff locally
          git fetch origin main --depth=1
          # Merge via API; if the local git cleanup fails after a successful
          # API merge, we catch it and verify the PR state instead of failing.
          if ! gh pr merge "$PR_NUMBER" --squash --delete-branch; then
            echo "[merge] gh pr merge exited non-zero — checking if merge succeeded via API..."
            STATE=$(gh pr view "$PR_NUMBER" --json state --jq .state)
            if [ "$STATE" = "MERGED" ]; then
              echo "[merge] PR #$PR_NUMBER was merged successfully (local git cleanup error ignored)"
            else
              echo "[merge] PR #$PR_NUMBER is in state: $STATE — merge failed"
              exit 1
            fi
          else
            echo "[merge] PR #$PR_NUMBER merged successfully"
          fi

      # -----------------------------------------------------------------------
      # Sign manifest
      # -----------------------------------------------------------------------
      # Build the signed manifest from the compile output. The manifest
      # contains URLs pointing to the GitHub Release artifacts, SHA256 hashes,
      # and an Ed25519 signature covering the entire manifest.
      - name: Sign manifest
        env:
          MESH_SIGNING_KEY: ${{ secrets.MESH_SIGNING_KEY }}
        run: |
          # Release tag: meshARKade-metadats-{YYYYMMDD-HHMMSS}
          # Unique per run — no overwrites, each release is a point-in-time snapshot.
          # Clients discover the latest via the GitHub Releases API.
          TAG="meshARKade-metadats-$(date -u +%Y%m%d-%H%M%S)"
          npm run sign -- "$TAG"
          echo "RELEASE_TAG=$TAG" >> "$GITHUB_ENV"

      # -----------------------------------------------------------------------
      # Create GitHub Release
      # -----------------------------------------------------------------------
      # Performs an incremental release. Unchanged system artifacts are not
      # re-uploaded; they are linked to previous releases in the manifest.
      # The upload-list.txt (generated by sign.ts) contains the filenames
      # of the artifacts that actually changed and need to be uploaded.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${RELEASE_TAG}"
          echo "[release] Creating release: $TAG"

          JSONL_COUNT=$(ls -1 output/*.jsonl.zst 2>/dev/null | wc -l)
          MANIFEST_SIZE=$(wc -c < output/manifest.json)
          UPLOAD_COUNT=$(wc -l < output/upload-list.txt)

          NOTES="## Signed Catalog Release (Incremental)

          **Total Systems:** $JSONL_COUNT
          **New/Updated Artifacts:** $UPLOAD_COUNT
          **Manifest size:** $MANIFEST_SIZE bytes
          "

          if [ -n "$PR_BODY" ]; then
            NOTES="$NOTES
          $PR_BODY
          "
          fi

          NOTES="$NOTES
          This release contains:
          - \`manifest.json\` — Ed25519-signed catalog index
          - \`catalog.dict\` — Zstd dictionary used for compression
          - \`*.jsonl.zst\` — Zstd-compressed JSONL artifacts (one per system)

          Verify the manifest signature against public key:
          \`16b49260d9aafeadbf395a9d1769f2eac5698006035dd0a1406241bee4c0af2c\`

          Generated by the meshARKade-database build pipeline."

          # Create the release with just the manifest initially
          gh release create "$TAG" \
            --target main \
            --title "$TAG" \
            --notes "$NOTES"

          echo "[release] Created release: $TAG"
          echo "[release] Uploading $UPLOAD_COUNT changed artifacts sequentially..."
          
          while IFS= read -r file; do
            if [ -f "output/$file" ]; then
              echo "[release]   Uploading $file..."
              # Capture error message if upload fails
              gh release upload "$TAG" "output/$file" 2>/tmp/upload_err.txt || (
                ERR_MSG=$(cat /tmp/upload_err.txt | head -n 1)
                echo "$file: $ERR_MSG" >> /tmp/failed_uploads.txt
              )
              sleep 0.5
            else
              echo "[release]   Warning: $file listed in upload-list.txt but not found in output/"
              echo "$file: (Not found in output/ directory)" >> /tmp/failed_uploads.txt
            fi
          done < output/upload-list.txt

          echo "[release] Published: $TAG ($JSONL_COUNT systems total, $UPLOAD_COUNT uploaded)"

      # -----------------------------------------------------------------------
      # Notify Discord — success
      # -----------------------------------------------------------------------
      - name: Discord notification (success)
        if: success() && env.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          TAG="${RELEASE_TAG}"
          JSONL_COUNT=$(ls -1 output/*.jsonl.zst 2>/dev/null | wc -l)
          ENTRIES=$(jq '.systems | map(.entries) | add' output/manifest.json 2>/dev/null || echo "?")
          TOTAL_SIZE=$(du -sh output/*.jsonl.zst 2>/dev/null | tail -1 | awk '{print $1}')
          DICT_SIZE=$(stat -c%s output/catalog.dict 2>/dev/null || echo "0")
          DICT_KB=$((DICT_SIZE / 1024))

          # Parse per-source stats from compile log
          # Format: [compile] no-intro: 369/377 DATs (8 skipped)
          STATS=""
          while IFS= read -r line; do
            SRC=$(echo "$line" | sed 's/.*\[compile\] \(.*\):.*/\1/')
            NUMS=$(echo "$line" | sed 's/.*: //')
            STATS="${STATS}${SRC}: ${NUMS}\n"
          done < <(grep -E '\[compile\] .+: [0-9]+/[0-9]+ DATs' /tmp/compile.log 2>/dev/null)

          BODY="**[View Release ${TAG}](https://github.com/Mesh-ARKade/meshARKade-database/releases/tag/${TAG})**\n\n"
          BODY="${BODY}**Sources**\n\`\`\`\n${STATS}\`\`\`\n"
          BODY="${BODY}**Totals**\n${JSONL_COUNT} artifacts · ${ENTRIES} entries\nDictionary: ${DICT_KB} KB"

          if [ -f /tmp/failed_uploads.txt ]; then
            FAILED=$(cat /tmp/failed_uploads.txt | head -n 10)
            FAILED_COUNT=$(wc -l < /tmp/failed_uploads.txt)
            BODY="${BODY}\n\n**⚠ Failed Uploads (${FAILED_COUNT})**\n\`\`\`\n${FAILED}\n\`\`\`"
          fi

          # Escape for JSON
          BODY_JSON=$(echo -e "$BODY" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))')

          curl -s -H "Content-Type: application/json" -d "{
            \"embeds\": [{
              \"title\": \"Catalog Published\",
              \"description\": ${BODY_JSON},
              \"color\": 3066993,
              \"url\": \"https://github.com/Mesh-ARKade/meshARKade-database/releases/tag/${TAG}\"
            }]
          }" "$DISCORD_WEBHOOK_URL"

      # -----------------------------------------------------------------------
      # Notify Discord — failure
      # -----------------------------------------------------------------------
      - name: Discord notification (failure)
        if: failure() && env.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          RUN_URL="https://github.com/Mesh-ARKade/meshARKade-database/actions/runs/${{ github.run_id }}"
          curl -s -H "Content-Type: application/json" -d "{
            \"embeds\": [{
              \"title\": \"Build Catalog Failed\",
              \"description\": \"Commit: \`${GITHUB_SHA::7}\` on \`${GITHUB_REF_NAME}\`\n[View logs](${RUN_URL})\",
              \"color\": 15158332
            }]
          }" "$DISCORD_WEBHOOK_URL"
