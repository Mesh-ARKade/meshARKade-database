# =============================================================================
# Build Catalog Pipeline
# =============================================================================
#
# This workflow compiles XML DAT files into signed zstd-compressed JSONL artifacts
# and publishes them as GitHub Releases for distribution to the P2P network.
#
# Fully automated flow:
#   1. meshARKade-dats relay opens a PR on this repo (update-dats/** branch)
#   2. This workflow triggers on the branch push
#   3. CI check: typecheck, test, compile (validates DATs parse correctly)
#   4. If compile passes → auto-merge the PR (squash into main)
#   5. Sign the compiled artifacts with Ed25519
#   6. Create GitHub Release with all .jsonl.gz files + signed manifest
#
# The merge and release happen in the SAME workflow run — no second trigger
# needed. We don't need branch protection or required checks because the
# relay is our own pipeline and we've already validated the DATs upstream.
#
# Also triggers on:
#   - Push to main (manual push or external merge) → compile + sign + release
#   - Manual workflow_dispatch → same as main
#
# Secrets required:
#   MESH_SIGNING_KEY — Ed25519 secret key (128 hex chars) for signing
#                      the catalog manifest. Generate with: npm run keygen
#
# =============================================================================

name: Build Catalog

on:
  push:
    branches:
      - main
      - 'update-dats/**'
  workflow_dispatch:

# Only allow one run at a time — prevents overlapping releases on the same day
concurrency:
  group: build-catalog
  cancel-in-progress: true

# Silence Node 20 deprecation warnings from actions/*@v4
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    # Write permissions for:
    #   - contents: creating releases, pushing tags, merging PRs
    #   - pull-requests: merging the auto-generated PR
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: npm install

      - name: Validate TypeScript
        run: npm run validate

      - name: Run tests
        run: npm test

      - name: Build TypeScript
        run: npm run build

      # -----------------------------------------------------------------------
      # Compile: XML DATs → zstd-compressed JSONL artifacts
      # -----------------------------------------------------------------------
      # Reads every .dat file from input/{source}/, parses the Logiqx XML,
      # and writes one .jsonl.zst file per system to output/.
      # Also writes output/compile-manifest.json with metadata for sign.ts.
      - name: Compile DAT files
        run: npm run compile

      # -----------------------------------------------------------------------
      # Auto-merge (update-dats/** branches only)
      # -----------------------------------------------------------------------
      # If we got this far on a PR branch, the DATs compiled successfully.
      # Squash-merge the PR into main so the input/ files land on main
      # before we create the release. The release tag targets main.
      - name: Auto-merge PR
        if: startsWith(github.ref, 'refs/heads/update-dats/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Find the open PR for this branch
          BRANCH="${GITHUB_REF#refs/heads/}"
          echo "[merge] Looking for PR on branch: $BRANCH"

          PR_NUMBER=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number')

          if [ -z "$PR_NUMBER" ]; then
            echo "[merge] No open PR found for branch $BRANCH — skipping merge"
            exit 0
          fi

          echo "[merge] Merging PR #$PR_NUMBER (squash)..."
          # Fetch main ref so gh can compute the squash diff locally
          git fetch origin main --depth=1
          # Merge via API; if the local git cleanup fails after a successful
          # API merge, we catch it and verify the PR state instead of failing.
          if ! gh pr merge "$PR_NUMBER" --squash --delete-branch; then
            echo "[merge] gh pr merge exited non-zero — checking if merge succeeded via API..."
            STATE=$(gh pr view "$PR_NUMBER" --json state --jq .state)
            if [ "$STATE" = "MERGED" ]; then
              echo "[merge] PR #$PR_NUMBER was merged successfully (local git cleanup error ignored)"
            else
              echo "[merge] PR #$PR_NUMBER is in state: $STATE — merge failed"
              exit 1
            fi
          else
            echo "[merge] PR #$PR_NUMBER merged successfully"
          fi

      # -----------------------------------------------------------------------
      # Sign manifest
      # -----------------------------------------------------------------------
      # Build the signed manifest from the compile output. The manifest
      # contains URLs pointing to the GitHub Release artifacts, SHA256 hashes,
      # and an Ed25519 signature covering the entire manifest.
      - name: Sign manifest
        env:
          MESH_SIGNING_KEY: ${{ secrets.MESH_SIGNING_KEY }}
        run: |
          # Release tag: meshARKade-metadats-{YYYYMMDD-HHMMSS}
          # Unique per run — no overwrites, each release is a point-in-time snapshot.
          # Clients discover the latest via the GitHub Releases API.
          TAG="meshARKade-metadats-$(date -u +%Y%m%d-%H%M%S)"
          npm run sign -- "$TAG"
          echo "RELEASE_TAG=$TAG" >> "$GITHUB_ENV"

      # -----------------------------------------------------------------------
      # Create GitHub Release
      # -----------------------------------------------------------------------
      # Upload all .jsonl.zst artifacts + the signed manifest as a GitHub
      # Release. This is the bootstrap distribution point — P2P nodes fetch
      # the manifest from the latest release, verify the Ed25519 signature,
      # then download only the system files they need on demand.
      #
      # Each release is a complete catalog snapshot. The timestamp tag
      # ensures every run gets a unique release — no overwrites needed.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${RELEASE_TAG}"
          echo "[release] Creating release: $TAG"

          JSONL_COUNT=$(ls -1 output/*.jsonl.zst 2>/dev/null | wc -l)
          MANIFEST_SIZE=$(wc -c < output/manifest.json)

          gh release create "$TAG" \
            output/*.jsonl.zst \
            output/catalog.dict \
            output/manifest.json \
            --target main \
            --title "$TAG" \
            --notes "## Signed Catalog Release

          **Systems:** $JSONL_COUNT
          **Manifest size:** $MANIFEST_SIZE bytes

          This release contains:
          - \`manifest.json\` — Ed25519-signed catalog index
          - \`catalog.dict\` — Zstd dictionary used for compression
          - \`*.jsonl.zst\` — Zstd-compressed JSONL artifacts (one per system)

          Verify the manifest signature against public key:
          \`a365e013bd067cc0450eac8d2440c0702de8447e4aeb458555fcf8c8f91d2a30\`

          Generated by the meshARKade-database build pipeline."

          echo "[release] Published: $TAG ($JSONL_COUNT systems)"
